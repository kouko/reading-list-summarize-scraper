# ============================================================================
# Reading List Summarize Scraper (rlss) — Configuration
# ============================================================================
#
# 預設讀取路徑：./config.yaml（執行 rlss 的目錄下）
# 可用 --config 指定：rlss --config /path/to/config.yaml
#
# 路徑支援 ~/ 展開為使用者家目錄（如 ~/Documents → /Users/you/Documents）
# 環境變數支援 ${VAR} 語法（僅 claude-api.api_key）

# ============================================================================
# 輸出目錄
# ============================================================================
# 萃取的內容和摘要檔案會儲存在此目錄下，以 domain 分子目錄：
#   {output_dir}/{domain_dir}/YYYY-MM-DD__{sha8}__summary.md
#   {output_dir}/{domain_dir}/YYYY-MM-DD__{sha8}__content.md
#
# 範例結構：
#   ./rlss-output/
#   ├── zenn_dev/
#   │   ├── 2026-03-29__350c2ef4__summary.md
#   │   └── 2026-03-29__350c2ef4__content.md
#   └── dev_classmethod_jp/
#       └── ...
output_dir: ./rlss-output

# ============================================================================
# LLM 設定
# ============================================================================
# 與 youtube-summarize-scraper (ytss) 完全相同的結構。
# 摘要、關鍵字提取、Mermaid 圖表生成都透過 LLM CLI 工具完成。
llm:

  # 使用的 LLM provider。可以是單一字串或 fallback 清單。
  # 清單中第一個為主要 provider，後續為 fallback（依序嘗試）。
  # 可用值：ollama, llamacpp, claude-api, claude-code, gemini-cli, qwen-code, openai-compat
  #
  # 範例（單一）：
  #   provider: "claude-code"
  # 範例（fallback chain）：
  #   provider: ["claude-code", "gemini-cli", "ollama"]
  provider: "claude-code"

  # Fallback 策略設定
  provider_fallback_strategy:
    # Provider 回報 quota/rate limit 錯誤後，等待多少秒才重試該 provider
    cooldown_seconds: 300
    # 連續多少次 quota 錯誤後，暫時跳過該 provider（circuit breaker 開啟）
    failure_threshold: 1

  # --- Ollama（本地 LLM 伺服器）---
  ollama:
    model: "llama3"                      # Ollama 模型名稱（如 llama3, qwen3.5:9b）
    endpoint: "http://localhost:11434"    # Ollama API 端點
    think: false                         # 啟用 thinking mode（消耗 4 倍 token）
    timeout: 900                         # 每次請求超時（秒）

  # --- llama.cpp（本地推理伺服器）---
  llamacpp:
    endpoint: "http://localhost:8080"     # llama.cpp server 端點

  # --- Claude API（Anthropic 官方 API）---
  claude-api:
    api_key: "${CLAUDE_API_KEY}"          # API Key（支援 ${ENV_VAR} 語法）
    model: "claude-sonnet-4-20250514"     # 模型 ID

  # --- Claude Code CLI ---
  claude-code:
    model: "haiku"                       # 模型：haiku, sonnet, opus, 或完整 model ID
    path: ""                             # claude binary 路徑（空 = 搜尋 PATH）
    timeout: 900                         # 每次請求超時（秒）

  # --- Gemini CLI ---
  gemini-cli:
    model: "auto"                        # 模型：auto, pro, flash, flash-lite
    path: ""                             # gemini binary 路徑（空 = 搜尋 PATH）
    timeout: 900

  # --- Qwen Code CLI ---
  qwen-code:
    model: "coder-model"                 # 模型：coder-model (free), qwen3-coder-plus (paid)
    path: ""                             # qwen binary 路徑（空 = 搜尋 PATH）
    timeout: 900

  # --- OpenAI 相容 API（oMLX, LM Studio, vLLM 等）---
  openai-compat:
    endpoint: "http://127.0.0.1:8000/v1" # API 端點
    model: ""                            # 模型名稱
    api_key: ""                          # API Key（選填）
    timeout: 900

# ============================================================================
# 摘要設定
# ============================================================================
summary:

  # 內建 prompt 的語言。影響摘要輸出的語言和格式。
  # 可用值：en, zh-Hant, ja
  language: "zh-Hant"

  # Inline prompt 文字。設定後會覆蓋內建 prompt。
  # 留空則使用內建 prompt（由 language 決定）。
  prompt: ""

  # 外部 prompt 檔案路徑。優先級最高（覆蓋 inline 和內建 prompt）。
  # 檔案內容會作為 prompt 模板，支援 {{title}}, {{domain}} 等變數。
  summary_prompt_file: ""

  # LLM 回應的最大 token 數
  max_tokens: 10000

  # 關鍵字提取設定（摘要完成後的第二階段，非阻塞）
  keywords:
    enabled: true                        # 是否啟用關鍵字提取
    language: "en"                       # 關鍵字輸出語言（可與摘要語言不同）
    count: 5                             # 最大關鍵字數量

  # Mermaid 圖表生成設定（摘要完成後的第三階段，非阻塞）
  mermaid:
    enabled: true                        # 是否啟用 Mermaid 流程圖生成

# ============================================================================
# Safari Reading List 設定
# ============================================================================
safari:

  # 是否啟用 Safari Reading List 來源
  # 需要 macOS Full Disk Access 權限（系統設定 > 隱私與安全性 > 完整磁碟取用權限）
  enabled: true

  # Bookmarks.plist 路徑。留空使用預設路徑。
  # 預設：~/Library/Safari/Bookmarks.plist
  plist_path: ""

# ============================================================================
# Chrome Reading List 設定
# ============================================================================
# 透過直接讀取 Chrome Sync Data LevelDB 取得 Reading List。
# 不需要啟動 Chrome、不需要 Extension、不受 SingletonLock 影響。
chrome:

  # 是否啟用 Chrome Reading List 來源
  enabled: true

  # Google Account email。用於自動找到對應的 Chrome profile。
  # 程式會掃描所有 Chrome profile 的 Local State，找到 user_name 匹配的 profile。
  # 留空則依賴 profile 欄位指定。
  google_account: ""

  # Chrome Profile 名稱。可以是 UI 顯示名稱（如 "Personal"）或
  # 內部資料夾名稱（如 "Default", "Profile 1"）。
  #
  # 與 google_account 的組合行為：
  #   google_account + profile 都有值 → 兩者必須匹配同一個 profile
  #   google_account 有值 + profile 為空 → 自動找匹配 email 的 profile
  #   google_account 為空 + profile 有值 → 按名稱查找 profile
  #   兩者都為空 → 使用 "Default" profile
  profile: "Default"

  # Chrome User Data 目錄路徑。留空使用系統預設路徑。
  # macOS 預設：~/Library/Application Support/Google/Chrome
  user_data_dir: ""

  # 當 profile 的 user-data-dir 被 SingletonLock 鎖定時，
  # 是否自動複製必要的 profile 檔案到暫存目錄使用。
  # 此設定僅影響萃取層（如需登入狀態的網頁），Reading List 讀取不受影響。
  clone_profile: true

# ============================================================================
# 萃取設定
# ============================================================================
# 使用 chromedp-undetected 控制 Chrome 萃取網頁內容。
# 包含反偵測機制（隱藏 navigator.webdriver、AutomationControlled 等）。
extract:

  # 預設是否使用 headless 模式。
  # true = 無視窗背景執行（預設）
  # false = 顯示 Chrome 視窗
  headless: true

  # 萃取時使用的 Chrome Profile（UI 名稱或資料夾名稱）。
  # 影響 Cookie/登入狀態。不同於 chrome.profile（那是 Reading List 用的）。
  chrome_profile: "Default"

  # 萃取用的 Google Account（選填）。
  # 可搭配 domain_rules 讓不同網域用不同帳號的登入狀態。
  google_account: ""

  # Chrome User Data 目錄路徑（萃取用）。
  # 留空使用系統預設路徑。
  user_data_dir: ""

  # 每頁萃取超時時間（headless 模式）
  timeout: 30s

  # headed 模式的超時時間（較長，含等待 Cloudflare 反爬蟲自動通過的時間）
  headed_timeout: 60s

  # 網頁載入後額外等待時間（等待 JavaScript 渲染完成）
  wait_after_load: 2s

  # 萃取的最短內容長度（字元數，使用 rune count 正確計算 CJK）。
  # 低於此長度的內容仍會儲存為 content.md，但會跳過 LLM 摘要。
  # 用於過濾登入頁面、錯誤頁面等無意義內容，避免浪費 LLM token。
  # 設為 0 則不檢查。
  min_content_length: 100

  # 偵測到 Cloudflare/CAPTCHA 阻擋時，是否自動切換為 headed 模式重試。
  # 偵測規則：內容中包含 2 個以上反爬蟲特徵（如 "cloudflare", "ray id" 等）。
  # 重試時使用 headed_timeout 作為超時時間。
  headed_on_block: true

  # 每個網域的個別萃取規則。
  # 可指定特定網域使用 headed 模式、特定 Chrome Profile 或 Google Account。
  # domains 支援精確匹配和 wildcard（*.example.com）。
  # 精確匹配 "example.com" 同時匹配 example.com 和 *.example.com。
  #
  # 範例：
  #   domain_rules:
  #     - domains: ["medium.com"]
  #       headed: true                   # Medium 需要 headed 模式
  #       google_account: "work@co.com"  # 使用工作帳號的登入狀態
  #       chrome_profile: ""             # 空 = 自動從 google_account 找
  #     - domains: ["*.substack.com"]
  #       headed: true
  #       chrome_profile: "Default"
  #     - domains: ["github.com"]
  #       headed: false                  # GitHub 可以 headless
  #       chrome_profile: "Profile 2"    # 但需要特定 profile 的登入狀態
  domain_rules: []

# ============================================================================
# 流水線設定
# ============================================================================
pipeline:

  # 是否跳過已處理的 URL（透過檔名中的 SHA8 hash 判斷）。
  # true = 跳過已存在 summary.md 的項目（預設）
  # false = 重新處理所有項目
  # CLI: --force 可覆蓋此設定
  skip_existing: true

  # Dry run 模式。只列出待處理項目，不實際萃取和摘要。
  # CLI: --dry-run
  dry_run: false

  # 處理項目之間的隨機延遲（秒）。避免觸發網站 rate limit。
  # 實際延遲 = delay_min ~ delay_max 之間的隨機值。
  # dry-run 模式下不延遲。
  delay_min: 3
  delay_max: 8

# ============================================================================
# 篩選設定
# ============================================================================
filter:

  # 只處理未讀項目
  # Safari: ReadingList.DateLastViewed 為空表示未讀
  # Chrome: status = UNREAD (0)
  # CLI: --unread-only
  unread_only: false

  # 只處理此日期之後加入的項目（格式：YYYY-MM-DD）
  # 留空 = 不篩選日期
  # CLI: --since 2026-03-01
  since: ""

  # 最大處理數量。0 = 無限制。
  # CLI: --limit 10 / -n 10
  limit: 0

# ============================================================================
# Watch 模式
# ============================================================================
# 定期重新掃描 Reading List 並處理新項目。
# 每輪會重新載入部分設定（filter, watch, llm, summary, pipeline）。
# SIGINT 在處理中 → 等當前項目完成後停止；在 sleep 中 → 立即退出。
watch:

  # 是否啟用 watch 模式
  # CLI: --watch
  enabled: false

  # 掃描間隔（分鐘）
  interval: 10

# ============================================================================
# copy_to 設定
# ============================================================================
# 處理完成後，將輸出檔案複製到指定路徑。
# 用於將摘要整理到 Obsidian vault 的特定目錄結構中。
copy_to:

  # 是否啟用 copy_to
  enabled: false

  # 目標目錄路徑模板。支援以下變數：
  #   {output_dir}  — 設定的 output_dir 值
  #   {date}        — 處理日期（YYYY-MM-DD）
  #   {date_added}  — 加入 Reading List 的日期（YYYY-MM-DD）
  #   {title}       — 網頁標題（display-friendly，已移除不安全字元）
  #   {sha8}        — URL 的 SHA256 前 8 碼
  #   {source}      — 來源（safari / chrome / manual）
  #   {domain}      — 原始網域（example.com）
  #   {domain_dir}  — 網域目錄名（example_com，. 替換為 _）
  #   {type}        — 檔案類型（summary / content）
  path: "{output_dir}/by-source/{source}/{domain_dir}"

  # 目標檔名模板。支援與 path 相同的變數。
  filename: "{date}__{title}__{type}.md"

  # 要複製的檔案類型
  # 可用值：summary, content
  files: ["summary", "content"]

  # 目標檔案已存在時是否覆蓋
  overwrite: false

# ============================================================================
# Obsidian 整合
# ============================================================================
obsidian:

  # 是否在 frontmatter tags 中加入 LLM 自動生成的關鍵字
  auto_tags: true

  # 是否使用 wikilink 格式（[[筆記名稱]]）
  wikilinks: true
