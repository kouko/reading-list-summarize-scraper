name: Release

on:
  push:
    tags:
      - 'v*'       # Triggers on v0.1.0, v1.0.0, v2.3.4-beta, etc.

permissions:
  contents: write  # Required for creating releases

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Bundle defuddle.min.js
        run: npm run build:defuddle

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run tests
        run: go test ./... -v

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          go build -ldflags="-s -w -X main.version=${VERSION}" -o rlss ./cmd/rlss/

      - name: Package tarball
        run: |
          ARCHIVE="rlss-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar czf "${ARCHIVE}" rlss
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rlss-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            rlss-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            rlss-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -la rlss-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rlss-*.tar.gz
            rlss-*.tar.gz.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256 values
        id: sha
        run: |
          echo "darwin_arm64=$(cat rlss-darwin-arm64.tar.gz.sha256 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(cat rlss-darwin-amd64.tar.gz.sha256 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(cat rlss-linux-arm64.tar.gz.sha256 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(cat rlss-linux-amd64.tar.gz.sha256 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate Homebrew formula
        run: |
          cat > rlss.rb << 'FORMULA'
          class Rlss < Formula
            desc "Fetch Safari/Chrome Reading Lists, extract content, summarize with LLM to Obsidian Markdown"
            homepage "https://github.com/kouko/reading-list-summarize-scraper"
            version "${{ steps.version.outputs.version }}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/kouko/reading-list-summarize-scraper/releases/download/${{ github.ref_name }}/rlss-darwin-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_arm64 }}"
              else
                url "https://github.com/kouko/reading-list-summarize-scraper/releases/download/${{ github.ref_name }}/rlss-darwin-amd64.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_amd64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/kouko/reading-list-summarize-scraper/releases/download/${{ github.ref_name }}/rlss-linux-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_arm64 }}"
              else
                url "https://github.com/kouko/reading-list-summarize-scraper/releases/download/${{ github.ref_name }}/rlss-linux-amd64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_amd64 }}"
              end
            end

            def install
              bin.install "rlss"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/rlss --version")
            end
          end
          FORMULA

      - name: Push formula to homebrew-tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source_file: 'rlss.rb'
          destination_repo: 'kouko/homebrew-tap'
          destination_folder: 'Formula'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          user_name: 'github-actions[bot]'
          commit_message: 'Update rlss to ${{ github.ref_name }}'
